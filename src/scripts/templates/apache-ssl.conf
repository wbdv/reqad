<VirtualHost 0.0.0.0:80>
<Directory "/home/%USER%/public_html">
    AllowOverride All
    Options MultiViews SymLinksIfOwnerMatch IncludesNoExec FollowSymLinks
    Require all granted
</Directory>

    ServerAdmin    webmaster@%DOMAIN%
    ServerName     www.%DOMAIN%
    ServerAlias    %DOMAIN% mail.%DOMAIN%
    DocumentRoot   /home/%USER%/public_html
    UseCanonicalName Off
    Options -ExecCGI -Includes
    #RemoveHandler cgi-script .cgi .pl .plx .ppl .perl
    ErrorLog logs/error_log
    #SetEnvIfNoCase User-Agent "freshping" dontlog
    #CustomLog logs/%DOMAIN%_log combined env=!dontlog
    CustomLog logs/%DOMAIN%_log combined
    <IfModule mod_ruid2.c>
        RUidGid %USER% %USER%
    </IfModule>
    RewriteEngine on
    RewriteCond %{SERVER_NAME} =www.%DOMAIN% [OR]
    RewriteCond %{SERVER_NAME} =%DOMAIN%
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost 0.0.0.0:443>
<Directory "/home/%USER%/public_html">
    AllowOverride All
    Options MultiViews SymLinksIfOwnerMatch IncludesNoExec FollowSymLinks
    Require all granted
</Directory>

    ServerAdmin    webmaster@%DOMAIN%
    ServerName     www.%DOMAIN%
    ServerAlias    %DOMAIN%
    DocumentRoot   /home/%USER%/public_html
    UseCanonicalName Off
    Options -ExecCGI -Includes
    #RemoveHandler cgi-script .cgi .pl .plx .ppl .perl
    ErrorLog logs/error_log
    CustomLog logs/%DOMAIN%_log combined
    <IfModule mod_ruid2.c>
        RUidGid %USER% %USER%
    </IfModule>

    php_admin_value open_basedir          /home/%USER%
    php_admin_value disable_functions     show_source,system,shell_exec,passthru,exec,popen,proc_open
    php_admin_value error_log             /home/%USER%/logs/%DOMAIN%-error.log
    php_admin_flag  log_errors            on
    php_admin_value sys_temp_dir          /home/%USER%/tmp
    php_admin_value upload_tmp_dir        /home/%USER%/tmp
    php_admin_value memory_limit          2048M
    php_value       session.save_handler  files
    php_value       session.save_path     /home/%USER%/tmp

    Include /etc/letsencrypt/options-ssl-apache.conf
%CERTS%
</VirtualHost>
</IfModule>
